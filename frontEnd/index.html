<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quotes Generator</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="quotes.js"></script>
  </head>
  <body>
    <div id="quote-box">
      <p id="quote"></p>
      <p id="author"></p>
      <button type="button" id="new-quote">Show another quote</button>
    </div>

	<div id="add-quote-box">
		<form id="quote-form">
			<input type="text" id="add-author" placeholder="Enter author" />
			<input type="text" id="add-quote" placeholder="Enter quote" />
			<button type="submit" id="add-quote-button">Add Quote</button>
		</form>
	</div>

  </body>
</html>
